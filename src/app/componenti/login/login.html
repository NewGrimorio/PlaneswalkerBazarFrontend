<div class="centro">
  <mat-card class="scheda">
    <mat-card-header>
      <mat-card-title>Accedi</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="accediAlSito()">
        <mat-form-field appearance="outline" class="campo">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="campo">
          <mat-label>Password</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="password" required />
        </mat-form-field>

        @if (errore()) {
          <p class="errore">{{ errore() }}</p>
        }

         <button matButton="filled" type="submit" class="campo" [disabled]="inCorso()">
          {{ inCorso() ? 'Accesso in corso...' : 'Accedi' }}
        </button>
      </form>
    </mat-card-content>
    <mat-card-footer class="footer">
      Sei un nuovo utente? <a routerLink="/registrazione">Registrati</a>
    </mat-card-footer>
  </mat-card>

</div>
