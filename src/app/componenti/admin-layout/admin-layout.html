<div class="scaffale">

  <aside class="barra-laterale">
    <div class="logo">PlaneswalkerBazar</div>
    <div class="etichetta">Gestione</div>
    <nav>
      @for (v of voci; track v.link) {
        <a [routerLink]="v.link" routerLinkActive="attiva"
           [routerLinkActiveOptions]="{ exact: v.link === '/admin' }">
          <mat-icon>{{ v.icona }}</mat-icon>
          <span>{{ v.titolo }}</span>
        </a>
      }
    </nav>
  </aside>

  <div class="colonna-destra">
    <header class="barra-alta">
      <span class="spazio"></span>
      <button class="chip-utente" [matMenuTriggerFor]="menuUtente">
        <span class="avatar">{{ iniziali }}</span>
          <span class="chi">
            <span class="nome">{{ utente()?.username }}</span>
            <span class="ruolo">Amministratore</span>
        </span>
        <mat-icon>expand_more</mat-icon>
      </button>
      <mat-menu #menuUtente="matMenu" xPosition="before">
        <a mat-menu-item routerLink="/admin/account">
          <mat-icon>manage_accounts</mat-icon>
          <span>Account</span>
        </a>
        <a mat-menu-item routerLink="/">
          <mat-icon>storefront</mat-icon>
          <span>Vai al negozio</span>
        </a>
        <button mat-menu-item (click)="esci()">
          <mat-icon>logout</mat-icon>
          <span>Esci</span>
        </button>
      </mat-menu>
    </header>
    <main class="contenuto">
      <router-outlet />
    </main>
  </div>

</div>
